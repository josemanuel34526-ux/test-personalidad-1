<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué Superhéroe Eres?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0f;
    --white: #f5f3ee;
    --yellow: #FFD93D;
    --red: #FF4C4C;
    --blue: #4C9FFF;
    --green: #4CFFA0;
    --purple: #C84CFF;
    --orange: #FF8C4C;
    --accent: var(--yellow);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 18px; height: 18px;
    background: var(--yellow);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.08s, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  .cursor.big { width: 48px; height: 48px; }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,217,61,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,217,61,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width:400px; height:400px; background:var(--yellow); top:-100px; right:-100px; animation-delay:0s; }
  .orb2 { width:300px; height:300px; background:var(--red); bottom:-50px; left:-80px; animation-delay:-4s; }
  .orb3 { width:250px; height:250px; background:var(--blue); top:50%; left:50%; animation-delay:-8s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.1); }
  }

  /* Wrapper */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  /* Header */
  .site-header {
    text-align: center;
    margin-bottom: 4rem;
    animation: fadeUp 0.8s ease both;
  }
  .eyebrow {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--yellow);
    border: 1px solid rgba(255,217,61,0.3);
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 1.4rem;
  }
  .site-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 10vw, 100px);
    line-height: 0.92;
    letter-spacing: 0.02em;
    color: var(--white);
    margin-bottom: 1rem;
  }
  .site-header h1 span { color: var(--yellow); }
  .site-header p {
    font-size: 15px;
    color: rgba(245,243,238,0.5);
    max-width: 340px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Progress */
  .progress-track {
    display: flex;
    gap: 6px;
    margin-bottom: 3rem;
    animation: fadeUp 0.8s 0.1s ease both;
  }
  .progress-dot {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    transition: background 0.4s;
  }
  .progress-dot.done { background: var(--yellow); }
  .progress-dot.current { background: rgba(255,217,61,0.4); }

  /* Question card */
  .question-area {
    animation: fadeUp 0.5s ease both;
  }
  .q-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1.4rem;
  }
  .q-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--yellow);
  }
  .q-divider { flex:1; height:1px; background: rgba(255,255,255,0.08); }

  .q-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(26px, 5vw, 42px);
    line-height: 1.1;
    letter-spacing: 0.02em;
    margin-bottom: 2.5rem;
    color: var(--white);
  }

  /* Options */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 3rem;
  }
  .option {
    position: relative;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 22px;
    cursor: none;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 16px;
    overflow: hidden;
  }
  .option::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--yellow);
    transform: scaleY(0);
    border-radius: 99px;
    transition: transform 0.25s;
  }
  .option:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.15);
    transform: translateX(4px);
  }
  .option:hover::before { transform: scaleY(1); }
  .option.selected {
    background: rgba(255,217,61,0.08);
    border-color: rgba(255,217,61,0.4);
    transform: translateX(4px);
  }
  .option.selected::before { transform: scaleY(1); background: var(--yellow); }

  .opt-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    transition: background 0.25s;
  }
  .option.selected .opt-icon { background: rgba(255,217,61,0.15); }
  .opt-text { font-size: 15px; font-weight: 400; line-height: 1.4; color: rgba(245,243,238,0.85); }
  .option.selected .opt-text { color: var(--white); }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 14px 32px;
    border-radius: 10px;
    cursor: none;
    border: none;
    transition: all 0.2s;
  }
  .btn-ghost {
    background: transparent;
    color: rgba(245,243,238,0.4);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-ghost:hover:not(:disabled) { color: var(--white); border-color: rgba(255,255,255,0.25); }
  .btn-ghost:disabled { opacity: 0.2; cursor: default; }
  .btn-primary {
    background: var(--yellow);
    color: var(--black);
    font-weight: 700;
    box-shadow: 0 0 0 0 rgba(255,217,61,0.4);
  }
  .btn-primary:hover:not(:disabled) {
    background: #ffe066;
    box-shadow: 0 0 30px rgba(255,217,61,0.3);
    transform: translateY(-1px);
  }
  .btn-primary:disabled { opacity: 0.3; cursor: default; }

  /* RESULT */
  .result-area {
    display: none;
    animation: fadeUp 0.7s ease both;
  }

  .result-hero-banner {
    border-radius: 20px;
    padding: 3rem 2.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .result-hero-banner::before {
    content: attr(data-emoji);
    position: absolute;
    right: -20px; bottom: -30px;
    font-size: 180px;
    line-height: 1;
    opacity: 0.12;
    pointer-events: none;
    filter: grayscale(0.3);
  }
  .result-label {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 0.5rem;
  }
  .result-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    line-height: 0.92;
    letter-spacing: 0.02em;
    margin-bottom: 0.8rem;
  }
  .result-subtitle {
    font-size: 14px;
    opacity: 0.65;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1.8rem;
  }
  .result-desc {
    font-size: 15px;
    line-height: 1.75;
    max-width: 460px;
    opacity: 0.85;
  }

  .traits-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 2rem;
  }
  .trait-tag {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.15);
    font-weight: 500;
    color: rgba(245,243,238,0.75);
  }

  .score-bars {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .score-bars h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.4);
    margin-bottom: 1.2rem;
  }
  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-hero-name { font-size: 13px; width: 90px; flex-shrink: 0; opacity: 0.7; }
  .score-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.34,1.56,0.64,1); width: 0; }
  .score-pct { font-size: 12px; width: 36px; text-align: right; opacity: 0.5; }

  .btn-restart {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 14px 36px;
    border-radius: 10px;
    cursor: none;
    border: 1px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--white);
    transition: all 0.2s;
  }
  .btn-restart:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.3); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Hero color themes */
  .theme-batman  { background: linear-gradient(135deg, #1a1a2e, #16213e); --hc: #a0a8d4; }
  .theme-ironman { background: linear-gradient(135deg, #2e1a0a, #3e1a0a); --hc: #FFD93D; }
  .theme-hulk    { background: linear-gradient(135deg, #0a1e0a, #0f2e10); --hc: #4CFFA0; }
  .theme-thor    { background: linear-gradient(135deg, #0a1230, #12204e); --hc: #4C9FFF; }
  .theme-spiderman { background: linear-gradient(135deg, #2e0a0a, #3e0a16); --hc: #FF4C4C; }
  .theme-antman  { background: linear-gradient(135deg, #1a1a0a, #2a2a12); --hc: #FFD93D; }

  .result-name { color: var(--hc, var(--yellow)); }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="wrapper">
  <!-- HEADER -->
  <header class="site-header">
    <div class="eyebrow">Test de Personalidad</div>
    <h1>¿Qué<br><span>Superhéroe</span><br>Eres?</h1>
    <p>9 preguntas para descubrir tu alter ego heroico</p>
  </header>

  <!-- QUIZ -->
  <div id="quiz">
    <div class="progress-track" id="progress-track"></div>
    <div class="question-area" id="question-area">
      <div class="q-meta">
        <span class="q-number" id="q-num">01 / 09</span>
        <div class="q-divider"></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options-grid" id="options"></div>
      <div class="nav">
        <button class="btn btn-ghost" id="btn-back" onclick="go(-1)" disabled>← Atrás</button>
        <button class="btn btn-primary" id="btn-next" onclick="go(1)" disabled>Siguiente →</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-area" id="result">
    <div class="result-hero-banner" id="r-banner">
      <div class="result-label">Tu alter ego es</div>
      <div class="result-name" id="r-name"></div>
      <div class="result-subtitle" id="r-subtitle"></div>
      <div class="result-desc" id="r-desc"></div>
    </div>
    <div class="traits-row" id="r-traits"></div>
    <div class="score-bars">
      <h3>Compatibilidad con cada héroe</h3>
      <div id="r-scores"></div>
    </div>
    <button class="btn-restart" onclick="restart()">↺ Volver a empezar</button>
  </div>
</div>

<script>
/* Cursor */
const cur = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});
document.querySelectorAll('button, .option').forEach(el => {
  el.addEventListener('mouseenter', () => cur.classList.add('big'));
  el.addEventListener('mouseleave', () => cur.classList.remove('big'));
});

/* Data */
const questions = [
  {
    text: "¿Con qué villano te identificarías más?",
    emoji: "🦹",
    options: [
      { label: "Joker — el caos es mi arte", icon: "🃏", pts: {batman:3,ironman:0,hulk:0,thor:0,spiderman:0,antman:0} },
      { label: "Lex Luthor — la inteligencia es poder", icon: "🧠", pts: {batman:1,ironman:3,hulk:0,thor:0,spiderman:1,antman:1} },
      { label: "Venom — fuerza bruta y actitud", icon: "💥", pts: {batman:0,ironman:0,hulk:3,thor:1,spiderman:1,antman:0} }
    ]
  },
  {
    text: "¿Qué color describe mejor tu personalidad?",
    emoji: "🎨",
    options: [
      { label: "Morado — misterioso y creativo", icon: "💜", pts: {batman:2,ironman:1,hulk:0,thor:2,spiderman:1,antman:1} },
      { label: "Gris — equilibrado y práctico", icon: "🩶", pts: {batman:1,ironman:1,hulk:1,thor:0,spiderman:2,antman:3} },
      { label: "Negro — elegante y poderoso", icon: "🖤", pts: {batman:3,ironman:1,hulk:1,thor:1,spiderman:0,antman:0} }
    ]
  },
  {
    text: "¿Cuál es tu deporte favorito?",
    emoji: "⚽",
    options: [
      { label: "Fútbol — trabajo en equipo", icon: "⚽", pts: {batman:0,ironman:1,hulk:1,thor:1,spiderman:3,antman:2} },
      { label: "Basketball — agilidad explosiva", icon: "🏀", pts: {batman:1,ironman:0,hulk:2,thor:1,spiderman:3,antman:1} },
      { label: "Béisbol — precisión y paciencia", icon: "⚾", pts: {batman:2,ironman:2,hulk:0,thor:0,spiderman:1,antman:3} }
    ]
  },
  {
    text: "¿Qué superhéroe te gusta más?",
    emoji: "🦸",
    options: [
      { label: "Thor — dios del trueno", icon: "⚡", pts: {batman:0,ironman:0,hulk:2,thor:5,spiderman:0,antman:0} },
      { label: "Hulk — fuerza imparable", icon: "💚", pts: {batman:0,ironman:0,hulk:5,thor:1,spiderman:0,antman:0} },
      { label: "Ant-Man — el ingenioso", icon: "🐜", pts: {batman:1,ironman:2,hulk:0,thor:0,spiderman:1,antman:5} }
    ]
  },
  {
    text: "¿Con qué equipo de fútbol te identificas?",
    emoji: "🏆",
    options: [
      { label: "Real Madrid — tradición y grandeza", icon: "👑", pts: {batman:1,ironman:1,hulk:1,thor:3,spiderman:1,antman:1} },
      { label: "Barcelona — juego bonito", icon: "🔵", pts: {batman:1,ironman:2,hulk:0,thor:0,spiderman:3,antman:2} },
      { label: "PSG — estrella global", icon: "✨", pts: {batman:1,ironman:3,hulk:1,thor:1,spiderman:1,antman:0} }
    ]
  },
  {
    text: "¿Con qué equipo de basketball vas?",
    emoji: "🏀",
    options: [
      { label: "Lakers — legado icónico", icon: "💛", pts: {batman:1,ironman:2,hulk:1,thor:3,spiderman:1,antman:0} },
      { label: "Spurs — disciplina total", icon: "⚫", pts: {batman:3,ironman:1,hulk:0,thor:0,spiderman:1,antman:2} },
      { label: "Raptors — velocidad y sorpresas", icon: "🦖", pts: {batman:0,ironman:1,hulk:2,thor:1,spiderman:3,antman:1} },
      { label: "Boston Celtics — historia y garra", icon: "🍀", pts: {batman:2,ironman:1,hulk:3,thor:1,spiderman:1,antman:0} }
    ]
  },
  {
    text: "¿Qué música escuchas antes de entrar en acción?",
    emoji: "🎵",
    options: [
      { label: "Pop — energía y optimismo", icon: "🎤", pts: {batman:0,ironman:1,hulk:0,thor:1,spiderman:3,antman:2} },
      { label: "Clásica — concentración", icon: "🎻", pts: {batman:3,ironman:2,hulk:0,thor:1,spiderman:0,antman:1} },
      { label: "Hip hop — actitud y ritmo", icon: "🎧", pts: {batman:1,ironman:3,hulk:2,thor:0,spiderman:2,antman:1} }
    ]
  },
  {
    text: "¿Qué película ves antes de una misión?",
    emoji: "🎬",
    options: [
      { label: "Cuenta Regresiva — adrenalina total", icon: "💣", pts: {batman:0,ironman:1,hulk:3,thor:2,spiderman:1,antman:0} },
      { label: "Estabilítica — mente fría", icon: "🧊", pts: {batman:3,ironman:2,hulk:0,thor:0,spiderman:1,antman:2} },
      { label: "Pacific Rim — épica y robots", icon: "🤖", pts: {batman:0,ironman:2,hulk:2,thor:3,spiderman:1,antman:0} }
    ]
  },
  {
    text: "¿Cuál es tu género de película favorito?",
    emoji: "🎭",
    options: [
      { label: "Comedia — la risa es mi superpoder", icon: "😂", pts: {batman:0,ironman:1,hulk:0,thor:1,spiderman:2,antman:4} },
      { label: "Acción — sin parar, a full", icon: "💥", pts: {batman:1,ironman:2,hulk:4,thor:3,spiderman:1,antman:0} },
      { label: "Suspenso — me gustan los misterios", icon: "🔍", pts: {batman:4,ironman:2,hulk:0,thor:0,spiderman:1,antman:1} }
    ]
  }
];

const heroes = {
  batman:    { name:"Batman",    subtitle:"El Caballero Oscuro",  emoji:"🦇", theme:"theme-batman",    color:"#a0a8d4", desc:"Eres analítico, estratégico y misterioso. No necesitas superpoderes porque tu mayor arma es tu mente. Prefieres actuar en las sombras y resolver los problemas con inteligencia y preparación.", traits:["Estratega","Misterioso","Disciplinado","Solitario"] },
  ironman:   { name:"Iron Man",  subtitle:"El Hombre de Hierro",  emoji:"🤖", theme:"theme-ironman",   color:"#FFD93D", desc:"Eres brillante, carismático y confías en la tecnología para resolver cualquier problema. Tu ego es grande, pero tu corazón lo es más. Combinas inteligencia con estilo.", traits:["Genio","Carismático","Innovador","Audaz"] },
  hulk:      { name:"Hulk",      subtitle:"El Gigante Esmeralda", emoji:"💚", theme:"theme-hulk",      color:"#4CFFA0", desc:"Tus emociones son tu motor. Cuando te apasionas por algo, eres imparable. Tienes una fuerza interior enorme y eres leal, intenso y completamente auténtico.", traits:["Apasionado","Intenso","Leal","Auténtico"] },
  thor:      { name:"Thor",      subtitle:"El Dios del Trueno",   emoji:"⚡", theme:"theme-thor",      color:"#4C9FFF", desc:"Tienes una presencia que llena el cuarto. Eres valiente, noble y te gusta la épica. Crees en la justicia y en hacer lo correcto, aunque a veces vayas directo sin pensar demasiado.", traits:["Valiente","Noble","Épico","Directo"] },
  spiderman: { name:"Spider-Man",subtitle:"El Amigable Vecino",   emoji:"🕷️", theme:"theme-spiderman", color:"#FF4C4C", desc:"Eres ágil, sociable y tienes una respuesta para todo. Equilibras responsabilidad con humor y siempre encuentras la manera de levantarte. Eres el favorito del equipo.", traits:["Ágil","Gracioso","Responsable","Resiliente"] },
  antman:    { name:"Ant-Man",   subtitle:"El Héroe Inesperado",  emoji:"🐜", theme:"theme-antman",    color:"#FFD93D", desc:"No eres el más obvio, pero sí el más ingenioso. Resuelves problemas que nadie más ve y tienes sentido del humor en cualquier situación. Siempre te subestiman... y eso te da ventaja.", traits:["Ingenioso","Humilde","Divertido","Adaptable"] }
};

const heroOrder = ["batman","ironman","hulk","thor","spiderman","antman"];

let current = 0;
let answers = new Array(questions.length).fill(null);

function buildProgress() {
  const track = document.getElementById('progress-track');
  track.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'progress-dot' + (i < current ? ' done' : i === current ? ' current' : '');
    track.appendChild(d);
  });
}

function render() {
  buildProgress();
  const q = questions[current];
  document.getElementById('q-num').textContent = String(current+1).padStart(2,'0') + ' / 09';
  document.getElementById('q-text').textContent = q.emoji + ' ' + q.text;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[current] === i ? ' selected' : '');
    div.innerHTML = `<div class="opt-icon">${opt.icon}</div><div class="opt-text">${opt.label}</div>`;
    div.onclick = () => pick(i);
    opts.appendChild(div);
  });

  document.getElementById('btn-back').disabled = current === 0;
  const nb = document.getElementById('btn-next');
  nb.disabled = answers[current] === null;
  nb.textContent = current === questions.length - 1 ? 'Ver resultado ✨' : 'Siguiente →';

  // animate
  const qa = document.getElementById('question-area');
  qa.style.animation = 'none';
  qa.offsetHeight;
  qa.style.animation = 'fadeUp 0.4s ease both';
}

function pick(i) {
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.className = 'option' + (idx === i ? ' selected' : '');
  });
  document.getElementById('btn-next').disabled = false;
}

function go(dir) {
  if (dir === 1 && current === questions.length - 1) { showResult(); return; }
  current = Math.max(0, Math.min(questions.length - 1, current + dir));
  render();
}

function showResult() {
  const scores = {batman:0,ironman:0,hulk:0,thor:0,spiderman:0,antman:0};
  answers.forEach((a, qi) => {
    if (a !== null) {
      const pts = questions[qi].options[a].pts;
      Object.keys(pts).forEach(h => { scores[h] += pts[h]; });
    }
  });
  const winner = Object.keys(scores).sort((a,b) => scores[b]-scores[a])[0];
  const h = heroes[winner];
  const total = Math.max(...Object.values(scores));

  document.getElementById('quiz').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';

  const banner = document.getElementById('r-banner');
  banner.className = 'result-hero-banner ' + h.theme;
  banner.setAttribute('data-emoji', h.emoji);
  banner.style.setProperty('--hc', h.color);

  document.getElementById('r-name').textContent = h.name;
  document.getElementById('r-subtitle').textContent = h.subtitle;
  document.getElementById('r-desc').textContent = h.desc;

  const traits = document.getElementById('r-traits');
  traits.innerHTML = h.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');

  const scoresEl = document.getElementById('r-scores');
  scoresEl.innerHTML = heroOrder.map(hk => {
    const hd = heroes[hk];
    const pct = Math.round((scores[hk] / total) * 100);
    return `
      <div class="score-row">
        <div class="score-hero-name">${hd.emoji} ${hd.name}</div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="background:${hd.color}" data-pct="${pct}"></div>
        </div>
        <div class="score-pct">${pct}%</div>
      </div>`;
  }).join('');

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  }, 200);

  // add cursor hover for btn-restart
  document.querySelector('.btn-restart').addEventListener('mouseenter', () => cur.classList.add('big'));
  document.querySelector('.btn-restart').addEventListener('mouseleave', () => cur.classList.remove('big'));
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  render();
}

render();
</script>
</body>
</html>
